# Central technical config for EasyHealth business events sent to Make.
# Single source of truth for the push journey (V1): channels, technical
# notification_type, deep-link route and whether the event counts toward the
# engagement frequency cap. Copy (title/body/emoji) lives in the Make scenario,
# NOT here. Omitted known events resolve to an empty channel list.
#
# Push journey V1 = 5 events only:
#   first_workout_not_started_2h, first_workout_not_started_24h,
#   first_workout_completed, user_inactive_3_days, user_inactive_7_days

# --- Email-only relationship journeys (orchestrated by Make) ---
user_created:
  channels:
    - email

subscription_created:
  channels:
    - email

checkout_started:
  channels:
    - email

trial_day_3:
  channels:
    - email

trial_day_6:
  channels:
    - email

trial_expired_without_subscription:
  channels:
    - email

workout_completed_partial:
  channels:
    - email

never_created_workout:
  channels:
    - email

churn_risk:
  channels:
    - email

# first_workout_created / plan_created_but_not_used stay as email/analytics
# events but NO LONGER trigger push (V1 simplification).
first_workout_created:
  channels:
    - email

plan_created_but_not_used:
  channels:
    - email

# --- Push journey V1 (the only 5 push events) ---
first_workout_not_started_2h:
  channels:
    - push
  notification_type: activation_reminder
  route: /workouts/ready
  engagement: true

first_workout_not_started_24h:
  channels:
    - push
  notification_type: activation_reminder
  route: /workouts/ready
  engagement: true

first_workout_completed:
  channels:
    - push
  notification_type: progress_update
  route: /workouts
  engagement: false

user_inactive_3_days:
  channels:
    - push
  notification_type: workout_reminder
  route: /workouts/ready
  engagement: true

user_inactive_7_days:
  channels:
    - push
    - email
  notification_type: workout_reminder
  route: /workouts/ready
  engagement: true
