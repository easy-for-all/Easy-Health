name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        working-directory: web
        run: npm ci

      # NEXT_PUBLIC_GOOGLE_WEB_CLIENT_ID is intentionally NOT needed here: the AAB
      # loads the live site (capacitor.config.ts server.url = https://easyhealth.art),
      # so native Google Sign-In uses the bundle built on the VPS, not this local build.
      - name: Build web
        working-directory: web
        run: npm run build

      - name: Add Android platform
        working-directory: web
        run: npx cap add android

      - name: Apply custom build config
        working-directory: web
        run: |
          cp android-config/app-build.gradle android/app/build.gradle
          # Root build.gradle carries the Firebase Crashlytics/Performance Gradle
          # plugin classpaths (applied in app/build.gradle only when
          # google-services.json is present). Must be deployed for those to load.
          cp android-config/build.gradle android/build.gradle
          cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android-config/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/gradle-wrapper.properties
          # Push notifications: manifest (POST_NOTIFICATIONS + FCM meta-data) and
          # notification icon/color resources.
          cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp android-config/MainActivity.java android/app/src/main/java/com/EasyHealth/myapp/MainActivity.java
          mkdir -p android/app/src/main/res/drawable android/app/src/main/res/values
          cp android-config/res/drawable/ic_stat_notification.xml android/app/src/main/res/drawable/ic_stat_notification.xml
          cp android-config/res/values/notification.xml android/app/src/main/res/values/notification.xml
          # Edge-to-edge: dark window background + splash/theme so the transparent
          # system bars reveal the EasyHealth dark surface instead of white bands.
          cp android-config/res/values/colors.xml android/app/src/main/res/values/colors.xml
          cp android-config/res/values/styles.xml android/app/src/main/res/values/styles.xml

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "❌ Secret GOOGLE_SERVICES_JSON_BASE64 não configurado"
            exit 1
          fi

          if ! echo "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '[:space:]' | base64 --decode \
            > web/android/app/google-services.json; then
            echo "❌ GOOGLE_SERVICES_JSON_BASE64 precisa conter o google-services.json em base64"
            exit 1
          fi

      - name: Verify google-services.json
        run: |
          if [ ! -s web/android/app/google-services.json ]; then
            echo "❌ google-services.json está vazio ou ausente"
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');

          const file = 'web/android/app/google-services.json';
          const expectedPackageName = 'com.EasyHealth.myapp';
          let config;

          try {
            config = JSON.parse(fs.readFileSync(file, 'utf8'));
          } catch (error) {
            console.error('❌ GOOGLE_SERVICES_JSON_BASE64 não decodificou para um JSON válido.');
            process.exit(1);
          }

          if (config.type === 'service_account' || config.private_key || config.client_email) {
            console.error('❌ GOOGLE_SERVICES_JSON_BASE64 parece ser uma Service Account.');
            console.error('Use o google-services.json do app Android no Firebase Console, não o JSON de Service Account.');
            process.exit(1);
          }

          const clients = Array.isArray(config.client) ? config.client : [];
          const androidClient = clients.find((client) => (
            client?.client_info?.android_client_info?.package_name === expectedPackageName
          ));

          const missingFields = [];
          if (!config.project_info || typeof config.project_info !== 'object') missingFields.push('project_info');
          if (!config.project_info?.project_number) missingFields.push('project_info.project_number');
          if (!config.project_info?.project_id) missingFields.push('project_info.project_id');
          if (!clients.length) missingFields.push('client[]');
          if (!androidClient) missingFields.push(`client[].client_info.android_client_info.package_name=${expectedPackageName}`);
          if (androidClient && !androidClient.client_info?.mobilesdk_app_id) {
            missingFields.push('client[].client_info.mobilesdk_app_id');
          }

          if (missingFields.length > 0) {
            console.error('❌ google-services.json não tem o formato esperado para Android/Firebase.');
            console.error(`Campos esperados ausentes: ${missingFields.join(', ')}`);
            process.exit(1);
          }
          NODE

          echo "✅ google-services.json Android válido ($(wc -c < web/android/app/google-services.json) bytes)"

      - name: Sync Capacitor
        working-directory: web
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | tr -d '[:space:]' | base64 --decode > "$RUNNER_TEMP/easyhealth-release.jks"

      - name: Make gradlew executable
        working-directory: web/android
        run: chmod +x gradlew

      - name: Verify Advertising ID permissions are absent
        working-directory: web/android
        run: |
          ./gradlew app:processReleaseMainManifest --no-daemon
          if grep -R -n \
            -e "com.google.android.gms.permission.AD_ID" \
            -e "android.permission.ACCESS_ADSERVICES_AD_ID" \
            -e "android.permission.ACCESS_ADSERVICES_ATTRIBUTION" \
            -e "android.permission.ACCESS_ADSERVICES_CUSTOM_AUDIENCE" \
            -e "android.permission.ACCESS_ADSERVICES_TOPICS" \
            app/build/intermediates/merged_manifest/release \
            app/build/intermediates/merged_manifests/release \
            app/build/intermediates/packaged_manifests/release 2>/dev/null; then
            echo "Advertising ID permission found in release manifest"
            exit 1
          fi

      - name: Verify androidbrowserhelper is absent
        working-directory: web/android
        run: |
          ./gradlew :app:dependencyInsight \
            --dependency androidbrowserhelper \
            --configuration releaseRuntimeClasspath \
            --no-daemon > /tmp/androidbrowserhelper-insight.txt
          cat /tmp/androidbrowserhelper-insight.txt
          if ! grep -q "No dependencies matching given input were found" /tmp/androidbrowserhelper-insight.txt; then
            echo "androidbrowserhelper still present in releaseRuntimeClasspath"
            exit 1
          fi

      - name: Build Release AAB
        working-directory: web/android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/easyhealth-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: "1.0.${{ github.run_number }}"
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: web/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

  upload-to-play:
    name: Upload to Google Play Internal Testing
    runs-on: ubuntu-latest
    needs: build
    environment: internal-testing
    timeout-minutes: 15

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.EasyHealth.myapp
          releaseFiles: app-release.aab
          track: internal
          status: completed
