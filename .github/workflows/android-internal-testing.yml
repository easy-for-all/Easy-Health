name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        working-directory: web
        run: npm ci

      # NEXT_PUBLIC_GOOGLE_WEB_CLIENT_ID is intentionally NOT needed here: the AAB
      # loads the live site (capacitor.config.ts server.url = https://easyhealth.art),
      # so native Google Sign-In uses the bundle built on the VPS, not this local build.
      - name: Build web
        working-directory: web
        run: npm run build

      - name: Add Android platform
        working-directory: web
        run: npx cap add android

      - name: Apply custom build config
        working-directory: web
        run: |
          cp android-config/app-build.gradle android/app/build.gradle
          cp android-config/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/gradle-wrapper.properties
          # Push notifications: manifest (POST_NOTIFICATIONS + FCM meta-data) and
          # notification icon/color resources.
          cp android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/res/drawable android/app/src/main/res/values
          cp android-config/res/drawable/ic_stat_notification.xml android/app/src/main/res/drawable/ic_stat_notification.xml
          cp android-config/res/values/notification.xml android/app/src/main/res/values/notification.xml

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '[:space:]' | base64 --decode \
            > web/android/app/google-services.json

      - name: Verify google-services.json
        run: |
          if [ ! -s web/android/app/google-services.json ]; then
            echo "❌ google-services.json está vazio ou ausente"
            exit 1
          fi
          echo "✅ google-services.json encontrado ($(wc -c < web/android/app/google-services.json) bytes)"

      - name: Sync Capacitor
        working-directory: web
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | tr -d '[:space:]' | base64 --decode > "$RUNNER_TEMP/easyhealth-release.jks"

      - name: Make gradlew executable
        working-directory: web/android
        run: chmod +x gradlew

      - name: Build Release AAB
        working-directory: web/android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/easyhealth-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: "1.0.${{ github.run_number }}"
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: web/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

  upload-to-play:
    name: Upload to Google Play Internal Testing
    runs-on: ubuntu-latest
    needs: build
    environment: internal-testing
    timeout-minutes: 15

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.EasyHealth.myapp
          releaseFiles: app-release.aab
          track: internal
          status: completed
