name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Add Android platform
        working-directory: web
        run: npx cap add android

      - name: Apply custom build config
        working-directory: web
        run: |
          cp android-config/app-build.gradle android/app/build.gradle
          cp android-config/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/gradle-wrapper.properties

      - name: Sync Capacitor
        working-directory: web
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | tr -d '[:space:]' | base64 --decode > "$RUNNER_TEMP/easyhealth-release.jks"

      - name: Make gradlew executable
        working-directory: web/android
        run: chmod +x gradlew

      - name: Build Release AAB
        working-directory: web/android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/easyhealth-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: "1.0.${{ github.run_number }}"
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: web/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
