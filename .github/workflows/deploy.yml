name: Deploy EasyHealth

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Deploy to VPS
        env:
          GIT_COMMIT: ${{ github.sha }}
        working-directory: /home/easy/Easy-Health
        run: |
          git fetch origin main
          mkdir -p scripts/production
          for script in backup_production.sh restore_production.sh pre_deploy_guard.sh safe_deploy.sh check_persistence.sh; do
            git show "$GIT_COMMIT":scripts/production/$script > scripts/production/$script
            chmod +x scripts/production/$script
          done
          bash scripts/production/safe_deploy.sh "$GIT_COMMIT"

      - name: Check TLS certificate expiry
        working-directory: /home/easy/Easy-Health
        run: bash scripts/check_cert_expiry.sh easyhealth.art 45 api.easyhealth.art || echo "::warning::TLS certificate for EasyHealth is expiring soon - renew it!"
