name: Deploy EasyHealth

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Deploy
        env:
          GIT_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p /home/easy/Easy-Health/scripts/production
          cp scripts/production/*.sh /home/easy/Easy-Health/scripts/production/
          chmod +x /home/easy/Easy-Health/scripts/production/*.sh
          cd /home/easy/Easy-Health
          bash scripts/production/safe_deploy.sh '${{ github.sha }}'

      - name: Check TLS certificate expiry
        run: bash scripts/check_cert_expiry.sh easyhealth.art 30 || echo "::warning::TLS certificate for easyhealth.art is expiring soon — renew it!"
