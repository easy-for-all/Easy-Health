name: PR Check

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      # TODO: remove continue-on-error once the pre-existing lint errors
      # (react-hooks/set-state-in-effect, React Compiler memoization) are fixed
      - run: npm run lint
        continue-on-error: true
